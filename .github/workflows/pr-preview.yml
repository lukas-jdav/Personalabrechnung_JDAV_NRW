name: PR Preview

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  comment-preview-link:
    runs-on: ubuntu-latest
    steps:
      - name: Post preview link
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: https://rawcdn.githack.com/${{ github.repository }}/${{ github.event.pull_request.head.sha }}/index.html
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        with:
          script: |
            const marker = "<!-- codex-pr-preview -->"
            const body = `${marker}
            Vorschau für diesen PR:

            - [Formular testen](${process.env.PREVIEW_URL})

            Stand:
            - Branch: \`${process.env.HEAD_REF}\`
            - Commit: \`${process.env.COMMIT_SHA}\`

            Die Vorschau wird bei neuen Commits im PR automatisch aktualisiert.`

            const { owner, repo } = context.repo
            const issue_number = context.payload.pull_request.number

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            })

            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              })
              return
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            })
